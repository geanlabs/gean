language = "C"
cpp_compat = true

header = """/*
 * leanmultisig_ffi.h - Auto-generated C header for the leanmultisig FFI library.
 *
 * DO NOT EDIT MANUALLY. This file is generated by cbindgen from src/lib.rs.
 * Run `cargo build` to regenerate.
 */"""
include_guard = "LEANMULTISIG_FFI_H"
sys_includes = ["stddef.h", "stdint.h", "stdbool.h"]

after_includes = """
/* Message hash length expected by aggregate/verify (32-byte attestation root). */
#define LEANMULTISIG_MESSAGE_HASH_LENGTH 32"""

documentation = true
documentation_style = "c99"
documentation_length = "full"

style = "Both"
usize_is_size_t = true

[export]
include = ["LeanmultisigResult", "LeanmultisigBytes"]

[enum]
rename_variants = "ScreamingSnakeCase"
prefix_with_name = true
